name = "zerotrustdns"
main = "src/index.ts"
compatibility_date = "2026-02-28"
compatibility_flags = ["nodejs_compat"]
minify = true

# Smart Placement: lets Cloudflare run this Worker on the edge node closest to
# the CLIENT instead of forcing it near the D1 primary region. Since the DNS
# hot path no longer needs a D1 round-trip per request (rules/bloom are now
# served from in-memory cache, refreshed in the background), the Worker is
# free to run wherever is fastest for the person actually making the query —
# this is what removes the random latency spikes seen from far-away regions.
[placement]
mode = "smart"

[build]
command = "cd web && npm install && npm run build"

[assets]
directory = "./static"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "zerotrustdns_db"

[triggers]
# Filter lists (AdGuard + hostsVN) refresh every hour — these are static text
# lists that don't change minute-to-minute, so hourly is plenty and cuts the
# background D1-write load by 2x vs the previous 30-minute interval.
crons = ["0 * * * *"]


[vars]
UPSTREAM_DOH = "https://qi0w15q016.cloudflare-gateway.com/dns-query"
MAX_LOG_DAYS = "30"
SYNC_TIMEOUT_MS = "30000"
MAX_LIST_DOMAINS = "500000"
BLOOM_FALSE_POSITIVE_RATE = "0.0001"
